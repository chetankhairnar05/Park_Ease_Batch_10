<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Park Ease - Booking Session</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- WebSocket Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen flex flex-col items-center p-4">
    <!-- Header -->
    <div
      class="w-full max-w-md bg-white rounded-xl shadow-sm p-4 mb-4 flex justify-between items-center"
    >
      <h1 class="font-bold text-gray-800">Booking Session</h1>
      <a
        href="dashboard.html"
        class="text-xs text-indigo-600 font-bold hover:underline"
        >Back to Dashboard</a
      >
    </div>

    <!-- STAGE 1: CONFIRMATION FORM -->
    <div
      id="stage-confirm"
      class="w-full max-w-md bg-white rounded-xl shadow-lg p-6"
    >
      <h2 class="text-xl font-bold text-gray-900 mb-4">Confirm Reservation</h2>

      <div class="bg-indigo-50 p-4 rounded-lg border border-indigo-100 mb-6">
        <div class="flex justify-between mb-2">
          <span class="text-xs text-gray-500 uppercase font-bold">Slot</span>
          <span id="display-slot" class="font-mono font-bold text-indigo-900"
            >Loading...</span
          >
        </div>
        <div class="flex justify-between">
          <span class="text-xs text-gray-500 uppercase font-bold">Rate</span>
          <span id="display-rate" class="font-mono font-bold text-indigo-900"
            >--</span
          >
        </div>
      </div>

      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-2"
          >Select Vehicle</label
        >
        <select
          id="vehicle-select"
          class="w-full p-3 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-indigo-500 outline-none"
        >
          <option>Loading vehicles...</option>
        </select>
      </div>

      <div class="flex gap-3">
        <button
          onclick="createBooking('RESERVED')"
          class="flex-1 bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 rounded-lg shadow transition"
        >
          Reserve (Hold)
        </button>
        <button
          onclick="createBooking('ACTIVE_PARKING')"
          class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-lg shadow transition"
        >
          Park Now (QR)
        </button>
      </div>
    </div>

    <!-- STAGE 2: LIVE SESSION (WebSocket Powered) -->
    <div
      id="stage-live"
      class="hidden w-full max-w-md bg-white rounded-xl shadow-2xl overflow-hidden border border-gray-200"
    >
      <!-- Status Header -->
      <div
        id="status-header"
        class="bg-amber-500 p-6 text-center text-white transition-colors duration-500"
      >
        <p class="text-xs font-bold uppercase tracking-widest opacity-80 mb-1">
          Current Status
        </p>
        <h2 id="live-status" class="text-3xl font-black tracking-tight">
          RESERVED
        </h2>
        <p id="live-timer" class="font-mono text-xl mt-2 opacity-90">00:00</p>
      </div>

      <!-- Action Area -->
      <div class="p-6 space-y-4">
        <div id="info-box" class="text-center text-sm text-gray-600 mb-4">
          Waiting for arrival...<br />
          <span class="text-xs text-gray-400"
            >Scan QR code at the pillar to start parking timer.</span
          >
        </div>

        <!-- WebSocket Actions -->
        <button
          id="btn-arrive"
          onclick="wsArrive()"
          class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-lg flex justify-center items-center gap-2 transform transition active:scale-95"
        >
          <svg
            class="w-6 h-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"
            />
          </svg>
          Simulate QR Scan (Arrival)
        </button>

        <button
          id="btn-exit"
          onclick="wsExit()"
          class="hidden w-full bg-rose-600 hover:bg-rose-700 text-white font-bold py-4 rounded-xl shadow-lg flex justify-center items-center gap-2 transform transition active:scale-95"
        >
          <svg
            class="w-6 h-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
            />
          </svg>
          Stop Timer & Pay
        </button>

        <!-- Bill Receipt (Hidden) -->
        <div
          id="receipt-box"
          class="hidden bg-gray-50 rounded-lg p-4 border border-gray-200"
        >
          <h3 class="font-bold text-gray-800 border-b pb-2 mb-2">Receipt</h3>
          <div class="flex justify-between text-sm mb-1">
            <span>Parking Fee</span>
            <span id="bill-amt" class="font-mono">₹0.00</span>
          </div>
          <div
            class="flex justify-between text-sm text-green-600 font-bold mt-2 pt-2 border-t"
          >
            <span>Paid via Wallet</span>
            <span>SUCCESS</span>
          </div>
          <a
            href="dashboard.html"
            class="block mt-4 text-center bg-gray-800 text-white py-2 rounded text-sm"
            >Return Home</a
          >
        </div>
      </div>
    </div>

    <!-- LOGIC -->
    <script>
      // ⚠️ UPDATE THIS URL TO YOUR RAILWAY URL
      const API_BASE = "http://localhost:8080/api";
      const SOCKET_URL = "http://localhost:8080/ws";

      const token = localStorage.getItem("parkease_token");
      const urlParams = new URLSearchParams(window.location.search);
      const slotId = urlParams.get("slotId");
      const areaId = urlParams.get("areaId");

      let stompClient = null;
      let activeBookingId = null;
      let timerInterval = null;

      if (!token) window.location.href = "auth.html";

      // --- INIT ---
      async function init() {
        if (!slotId || !areaId) return alert("Invalid URL parameters");

        // 1. Fetch Vehicles
        const vehicles = await fetchAPI("/user/vehicles");
        const vSelect = document.getElementById("vehicle-select");
        vSelect.innerHTML = "";
        vehicles.forEach((item) => {
          const opt = document.createElement("option");
          opt.value = item.vehicle.vehicleId;
          opt.text = `${item.vehicle.model} (${item.vehicle.registerNumber})`;
          if (item.isPrimary) opt.selected = true;
          vSelect.appendChild(opt);
        });

        // 2. Fetch Slot Details (Optional, for display)
        // Just displaying ID for now to save an API call
        document.getElementById("display-slot").innerText = `ID: ${slotId}`;
        document.getElementById("display-rate").innerText = "Standard Rate"; // Can fetch details if needed
      }

      async function fetchAPI(endpoint, method = "GET", body = null) {
        const headers = {
          "Content-Type": "application/json",
          "X-Auth-Token": token,
        };
        const opts = { method, headers };
        if (body) opts.body = JSON.stringify(body);
        const res = await fetch(`${API_BASE}${endpoint}`, opts);
        return res.json();
      }

      // --- BOOKING CREATION ---
      async function createBooking(status) {
        const vehicleId = document.getElementById("vehicle-select").value;

        try {
          const res = await fetchAPI("/bookings/create", "POST", {
            vehicleId,
            slotId,
            areaId,
            initialStatus: status,
          });

          if (res.error) throw new Error(res.error);

          activeBookingId = res.id; // Corrected from res.bookingId

          // Switch UI
          document.getElementById("stage-confirm").classList.add("hidden");
          document.getElementById("stage-live").classList.remove("hidden");

          // Init WebSocket
          connectWebSocket();

          // Initial State Update
          updateUIState(res);
        } catch (err) {
          alert("Booking Failed: " + err.message);
        }
      }

      // --- WEBSOCKETS ---
      function connectWebSocket() {
        const socket = new SockJS(SOCKET_URL);
        stompClient = Stomp.over(socket);
        stompClient.debug = null; // Silence logs

        stompClient.connect({ "X-Auth-Token": token }, () => {
          console.log("🔗 WebSocket Connected");

          // Listen for Booking Updates (Arrival / Exit / Cancellation)
          stompClient.subscribe("/user/queue/booking-updates", (msg) => {
            const booking = JSON.parse(msg.body);
            updateUIState(booking);
          });

          // Listen for Notifications (No Show Penalty)
          stompClient.subscribe("/user/queue/notifications", (msg) => {
            alert("🔔 ALERT: " + msg.body);
            // If cancelled, redirect home
            if (msg.body.includes("Cancelled")) {
              window.location.href = "dashboard.html";
            }
          });
        });
      }

      function wsArrive() {
        stompClient.send(
          "/app/booking/arrive",
          {},
          JSON.stringify({ bookingId: activeBookingId })
        );
      }

      function wsExit() {
        stompClient.send(
          "/app/booking/end",
          {},
          JSON.stringify({ bookingId: activeBookingId })
        );
      }

      // --- UI UPDATES ---
      function updateUIState(booking) {
        const statusEl = document.getElementById("live-status");
        const headerEl = document.getElementById("status-header");
        const btnArrive = document.getElementById("btn-arrive");
        const btnExit = document.getElementById("btn-exit");
        const infoBox = document.getElementById("info-box");

        statusEl.innerText = booking.status;

        // RESET TIMER logic based on state
        startTimer();

        if (booking.status === "RESERVED") {
          headerEl.className = "bg-amber-500 p-6 text-center text-white";
          btnArrive.classList.remove("hidden");
          btnExit.classList.add("hidden");
          infoBox.innerHTML =
            "Reservation Active.<br><span class='text-xs'>Arrive within 10 mins for free entry.</span>";
        } else if (booking.status === "ACTIVE_PARKING") {
          headerEl.className = "bg-emerald-600 p-6 text-center text-white";
          btnArrive.classList.add("hidden");
          btnExit.classList.remove("hidden");
          infoBox.innerHTML =
            "Parking Timer Running...<br><span class='text-xs'>Enjoy your stay.</span>";
        } else if (booking.status === "COMPLETED") {
          headerEl.className = "bg-gray-800 p-6 text-center text-white";
          statusEl.innerText = "PAID";
          btnExit.classList.add("hidden");
          infoBox.classList.add("hidden");

          // Show Receipt
          document.getElementById("receipt-box").classList.remove("hidden");
          document.getElementById("bill-amt").innerText = `₹${
            booking.amountPaid || booking.finalParkingFee
          }`;
          stopTimer();
        }
      }

      function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        let seconds = 0;
        const display = document.getElementById("live-timer");

        timerInterval = setInterval(() => {
          seconds++;
          const mins = Math.floor(seconds / 60)
            .toString()
            .padStart(2, "0");
          const secs = (seconds % 60).toString().padStart(2, "0");
          display.innerText = `${mins}:${secs}`;
        }, 1000); // UI Timer runs at normal speed (visual only)
      }

      function stopTimer() {
        clearInterval(timerInterval);
      }

      init();
    </script>
  </body>
</html>
